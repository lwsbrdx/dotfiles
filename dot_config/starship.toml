format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$golang\
$python\
$bun\
$cmd_duration\
$character"""

[directory]
style = "bold cyan"
truncation_length = 8
truncate_to_repo = false
read_only = " 󰌾"
format = "[$path]($style)[$read_only](red) "

[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold red"
format = "([$all_status$ahead_behind]($style) )"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
staged = "+${count}"
modified = "!${count}"
untracked = "?${count}"
deleted = "✘${count}"
stashed = ""

[nodejs]
symbol = " "
style = "green"
format = "[$symbol($version)]($style) "
detect_files = ["package.json", ".nvmrc", ".node-version"]
detect_folders = ["node_modules"]

[golang]
symbol = " "
style = "cyan"
format = "[$symbol($version)]($style) "

[python]
symbol = " "
style = "yellow"
format = "[${symbol}(${version})(\\($virtualenv\\))]($style) "
detect_files = ["requirements.txt", "pyproject.toml", ".python-version", "Pipfile"]

[bun]
symbol = " "
style = "yellow"
format = "[$symbol($version)]($style) "

[cmd_duration]
min_time = 2_000
style = "yellow dimmed"
format = "[󱎫 $duration]($style) "

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

# Modules désactivés
[conda]
disabled = true
[aws]
disabled = true
[gcloud]
disabled = true
[azure]
disabled = true
[package]
disabled = true
