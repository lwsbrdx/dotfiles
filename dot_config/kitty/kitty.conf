# Font configuration
font_family      MesloLGS NF
font_size        14.0

# Shell integration (pour de meilleures performances)
shell_integration enabled

# Permet le protocole d'images (nécessaire pour image.nvim)
allow_remote_control yes

# Keyboard shortcuts
# Command+R pour effacer l'historique
map cmd+r clear_terminal clear active

# Command+K pour clear l'écran (comme la commande clear)
map cmd+k send_text all \x0c

# Alt+Backspace - supprimer le mot avant le curseur
map alt+backspace send_text all \x1b\x7f

# Command+Left - début de ligne (Ctrl+A)
map cmd+left send_text all \x01

# Command+Right - fin de ligne (Ctrl+E)
map cmd+right send_text all \x05

# Command+Backspace - supprimer toute la ligne avant le curseur (Ctrl+U)
map cmd+backspace send_text all \x15

# Alt+Right - avancer d'un mot
map alt+right send_text all \x1bf

# Alt+Left - reculer d'un mot
map alt+left send_text all \x1bb

# Alt+B - reculer d'un mot
map alt+b send_text all \x1bb

# Alt+F - avancer d'un mot
map alt+f send_text all \x1bf

# Alt+D - supprimer le mot après le curseur
map alt+d send_text all \x1bd

# Alt+U - mettre en majuscule du curseur à la fin du mot
map alt+u send_text all \x1bu

# Alt+L - mettre en minuscule du curseur à la fin du mot
map alt+l send_text all \x1bl

# Alt+C - capitaliser le mot actuel
map alt+c send_text all \x1bc

# Alt+. - insérer le dernier argument de la commande précédente
map alt+. send_text all \x1b.

# Alt+Y - yank le haut de la kill-ring
map alt+y send_text all \x1by

# Alt+/ - tentative de complétion
map alt+/ send_text all \x1b/

# Alt+T - transposer les mots autour du curseur
map alt+t send_text all \x1bt

# Alt+R - rappeler la dernière commande qui correspond à l'entrée
map alt+r send_text all \x1br

# Alt+N - rechercher en avant dans l'historique
map alt+n send_text all \x1bn

# Alt+P - rechercher en arrière dans l'historique
map alt+p send_text all \x1bp

# Alt+Q - personnalisable
map alt+q send_text all \x1bq

# Désactiver les raccourcis par défaut qui pourraient entrer en conflit
map cmd+n no_op
map cmd+t no_op

# Performance et apparence
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Curseur
cursor_blink_interval 0

# Mouse
mouse_hide_wait 3.0
url_style curly

# macOS spécifique
# Option gauche = Alt (pour les raccourcis), Option droite = accents
macos_option_as_alt left
macos_quit_when_last_window_closed yes
